<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vox — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --surface: #0f1318;
    --surface2: #131920;
    --border: #1e2530;
    --teal: #00e5c0;
    --teal-dim: rgba(0, 229, 192, 0.10);
    --teal-glow: rgba(0, 229, 192, 0.3);
    --text: #e8edf5;
    --muted: #5a6577;
    --danger: #ff4d6a;
    --danger-dim: rgba(255,77,106,0.1);
    --font-head: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,192,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,192,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ─────────────── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 64px 1fr;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ── Topbar ─────────────── */
  .topbar {
    grid-column: 1 / -1;
    background: rgba(15, 19, 24, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-left { display: flex; align-items: center; gap: 16px; }

  .brand {
    font-family: var(--font-head);
    font-size: 20px;
    font-weight: 800;
    color: var(--teal);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 100px;
    font-weight: 500;
  }
  .badge-admin { background: rgba(255,200,0,0.12); color: #ffc800; border: 1px solid rgba(255,200,0,0.25); }
  .badge-live { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(0,229,192,0.2); display: flex; align-items: center; gap: 5px; }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--teal);
    border-radius: 50%;
    animation: pulse 2s infinite;
    box-shadow: 0 0 6px var(--teal);
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.8); }
  }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .toggle-btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid;
  }

  .toggle-btn.open {
    background: var(--danger-dim);
    color: var(--danger);
    border-color: rgba(255,77,106,0.25);
  }
  .toggle-btn.open:hover { background: rgba(255,77,106,0.18); }
  .toggle-btn.closed {
    background: var(--teal-dim);
    color: var(--teal);
    border-color: rgba(0,229,192,0.25);
  }
  .toggle-btn.closed:hover { background: rgba(0,229,192,0.18); }

  .share-btn {
    padding: 8px 18px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .share-btn:hover { color: var(--text); border-color: rgba(0,229,192,0.3); }

  /* ── Sidebar ─────────────── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .room-name {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
    word-break: break-word;
  }

  .room-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }

  .stat-card .val {
    font-family: var(--font-head);
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 2px;
  }
  .stat-card .lbl { font-size: 10px; color: var(--muted); }

  .room-id-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 12px;
    color: var(--muted);
  }

  .room-id-box .id {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    color: var(--teal);
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .copy-small {
    margin-top: 8px;
    padding: 6px 12px;
    background: var(--teal-dim);
    color: var(--teal);
    border: 1px solid rgba(0,229,192,0.2);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .copy-small:hover { background: rgba(0,229,192,0.18); }

  /* Status pill */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 16px;
  }
  .status-pill.open { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(0,229,192,0.2); }
  .status-pill.closed { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,77,106,0.2); }

  /* ── Feed ─────────────── */
  .feed-area {
    overflow-y: auto;
    padding: 24px;
  }

  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .feed-header h2 {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 700;
  }

  .feed-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .sort-btn {
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover { color: var(--text); border-color: rgba(0,229,192,0.3); }
  .sort-btn.active { color: var(--teal); border-color: rgba(0,229,192,0.3); background: var(--teal-dim); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    animation: fadeUp 0.5s ease both;
  }
  .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.5; }
  .empty h3 { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 12px; }

  /* Feedback cards */
  .feed { display: flex; flex-direction: column; gap: 12px; }

  .fb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: slideIn 0.4s ease both;
    transition: border-color 0.2s;
    position: relative;
  }

  .fb-card:hover { border-color: rgba(0,229,192,0.2); }
  .fb-card.new { border-color: rgba(0,229,192,0.35); background: rgba(0,229,192,0.04); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .fb-emoji {
    width: 40px;
    height: 40px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .fb-body { flex: 1; min-width: 0; }

  .fb-message {
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
    margin-bottom: 8px;
  }

  .fb-meta {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .fb-del {
    width: 32px;
    height: 32px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    opacity: 0;
  }

  .fb-card:hover .fb-del {
    opacity: 1;
  }

  .fb-del:hover {
    background: var(--danger-dim);
    border-color: rgba(255,77,106,0.25);
    color: var(--danger);
  }

  /* New badge */
  .new-badge {
    position: absolute;
    top: -1px;
    right: 12px;
    background: var(--teal);
    color: #080b10;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 0 0 6px 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <a class="brand" href="/">🎙️ Vox</a>
      <span class="badge badge-admin">Admin</span>
      <span class="badge badge-live"><div class="live-dot"></div><span id="viewers-count">0</span> live</span>
    </div>
    <div class="topbar-right">
      <button class="share-btn" onclick="copyRoomLink()">📋 Copy Room Link</button>
      <button class="toggle-btn open" id="toggle-btn" onclick="toggleRoom()">🔒 Close Room</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Room Status</div>
      <div class="status-pill open" id="status-pill">● Open</div>
      <div class="room-name" id="side-title">Loading...</div>
      <div class="room-desc" id="side-desc"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Stats</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="val" id="stat-total">0</div>
          <div class="lbl">responses</div>
        </div>
        <div class="stat-card">
          <div class="val" id="stat-live">0</div>
          <div class="lbl">live viewers</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Room Code</div>
      <div class="room-id-box">
        <div class="id" id="room-id-display">—</div>
        <div style="font-size:11px; color: var(--muted);">Share this code</div>
        <button class="copy-small" onclick="copyRoomLink()">Copy feedback link</button>
      </div>
    </div>
  </div>

  <!-- Feed -->
  <div class="feed-area" id="feed-area">
    <div class="feed-header">
      <h2>Feedback</h2>
      <div class="feed-controls">
        <button class="sort-btn active" onclick="sortFeed('newest', this)">Newest</button>
        <button class="sort-btn" onclick="sortFeed('oldest', this)">Oldest</button>
      </div>
    </div>

    <div class="empty" id="empty-state">
      <div class="empty-icon">🎙️</div>
      <h3>Waiting for feedback...</h3>
      <p>Share the room link and responses will appear here live.</p>
    </div>

    <div class="feed" id="feed"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const params = new URLSearchParams(location.search);
  const roomId = params.get('id');
  const adminToken = params.get('token');
  let sortOrder = 'newest';
  let feedbackData = [];
  let ws;

  if (!roomId || !adminToken) window.location.href = '/';

  // ── Load ──────────────────────────────────────────────────

  async function loadAll() {
    try {
      const [roomRes, fbRes] = await Promise.all([
        fetch(`/api/rooms/${roomId}`),
        fetch(`/api/rooms/${roomId}/feedback?token=${adminToken}`)
      ]);

      if (!roomRes.ok || !fbRes.ok) {
        showToast('Error: Could not load room data.');
        return;
      }

      const room = await roomRes.json();
      const feedback = await fbRes.json();

      document.getElementById('side-title').textContent = room.title;
      document.getElementById('side-desc').textContent = room.description || '';
      document.getElementById('room-id-display').textContent = room.id;
      document.title = `Vox Admin — ${room.title}`;

      setRoomStatus(room.is_open);
      updateStats(feedback.length, room.live_viewers);

      feedbackData = feedback;
      renderFeed();
    } catch (e) {
      showToast('Could not connect to server.');
    }
  }

  function setRoomStatus(isOpen) {
    const pill = document.getElementById('status-pill');
    const btn = document.getElementById('toggle-btn');
    pill.className = 'status-pill ' + (isOpen ? 'open' : 'closed');
    pill.textContent = isOpen ? '● Open' : '● Closed';
    btn.className = 'toggle-btn ' + (isOpen ? 'open' : 'closed');
    btn.textContent = isOpen ? '🔒 Close Room' : '🔓 Open Room';
  }

  function updateStats(total, live) {
    document.getElementById('stat-total').textContent = total ?? feedbackData.length;
    document.getElementById('stat-live').textContent = live ?? 0;
    document.getElementById('viewers-count').textContent = live ?? 0;
  }

  // ── Render ────────────────────────────────────────────────

  function renderFeed(newId = null) {
    const feed = document.getElementById('feed');
    const empty = document.getElementById('empty-state');

    const sorted = [...feedbackData].sort((a, b) => {
      const d = new Date(a.created_at) - new Date(b.created_at);
      return sortOrder === 'newest' ? -d : d;
    });

    empty.style.display = sorted.length === 0 ? 'block' : 'none';
    feed.innerHTML = '';

    sorted.forEach(fb => {
      feed.appendChild(buildCard(fb, fb.id === newId));
    });
  }

  function buildCard(fb, isNew = false) {
    const card = document.createElement('div');
    card.className = 'fb-card' + (isNew ? ' new' : '');
    card.id = `fb-${fb.id}`;

    if (isNew) {
      const badge = document.createElement('div');
      badge.className = 'new-badge';
      badge.textContent = 'New';
      card.appendChild(badge);
      setTimeout(() => {
        card.classList.remove('new');
        badge.remove();
      }, 4000);
    }

    const emoji = document.createElement('div');
    emoji.className = 'fb-emoji';
    emoji.textContent = fb.emoji || '💬';

    const body = document.createElement('div');
    body.className = 'fb-body';

    const msg = document.createElement('div');
    msg.className = 'fb-message';
    msg.textContent = fb.message;

    const meta = document.createElement('div');
    meta.className = 'fb-meta';
    meta.textContent = formatTime(fb.created_at);

    body.appendChild(msg);
    body.appendChild(meta);

    const del = document.createElement('button');
    del.className = 'fb-del';
    del.title = 'Delete';
    del.textContent = '✕';
    del.onclick = () => deleteFeedback(fb.id);

    card.appendChild(emoji);
    card.appendChild(body);
    card.appendChild(del);
    return card;
  }

  function formatTime(iso) {
    const d = new Date(iso + 'Z');
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 10) return 'just now';
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  // ── Actions ───────────────────────────────────────────────

  async function toggleRoom() {
    try {
      const res = await fetch(`/api/rooms/${roomId}/toggle`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_token: adminToken })
      });
      const data = await res.json();
      setRoomStatus(data.is_open);
      showToast(data.is_open ? '✓ Room is now open' : '✓ Room closed');
    } catch (e) {
      showToast('Failed to toggle room status.');
    }
  }

  async function deleteFeedback(id) {
    try {
      await fetch(`/api/rooms/${roomId}/feedback/${id}?token=${adminToken}`, { method: 'DELETE' });
      feedbackData = feedbackData.filter(f => f.id !== id);
      renderFeed();
      updateStats(feedbackData.length, null);
      showToast('✓ Feedback removed');
    } catch (e) {
      showToast('Failed to delete.');
    }
  }

  function sortFeed(order, btn) {
    sortOrder = order;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  }

  function copyRoomLink() {
    const url = `${location.origin}/room?id=${roomId}`;
    navigator.clipboard.writeText(url).then(() => showToast('✓ Room link copied!'));
  }

  // ── WebSocket ─────────────────────────────────────────────

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/${roomId}`);

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'viewer_count') {
        updateStats(null, msg.count);
        document.getElementById('stat-live').textContent = msg.count;
      } else if (msg.type === 'new_feedback') {
        feedbackData.unshift(msg.feedback);
        renderFeed(msg.feedback.id);
        updateStats(feedbackData.length, null);
        showToast('💬 New feedback received!');
      } else if (msg.type === 'delete_feedback') {
        feedbackData = feedbackData.filter(f => f.id !== msg.id);
        const card = document.getElementById(`fb-${msg.id}`);
        if (card) card.remove();
        updateStats(feedbackData.length, null);
      } else if (msg.type === 'room_status') {
        setRoomStatus(msg.is_open);
      }
    };

    ws.onclose = () => setTimeout(connectWS, 3000);
  }

  // ── Toast ─────────────────────────────────────────────────

  let toastTimer;
  function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Init ──────────────────────────────────────────────────

  loadAll();
  connectWS();

  // Refresh relative timestamps every 30s
  setInterval(() => renderFeed(), 30000);
</script>
</body>
</html>
